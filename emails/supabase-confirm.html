<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background-color:#070b14;font-family:Georgia,'Times New Roman',serif;margin:0;padding:0;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#070b14;padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0">

          <!-- Brand header -->
          <tr>
            <td align="center" style="padding-bottom:40px;">
              <p style="font-size:10px;letter-spacing:4px;margin:0 0 10px;">
                <span style="color:#4ade80;">&#9679;</span>&nbsp;
                <span style="color:#fbbf24;">&#9679;</span>&nbsp;
                <span style="color:#f97316;">&#9679;</span>&nbsp;
                <span style="color:#f43f5e;">&#9679;</span>&nbsp;
                <span style="color:#a855f7;">&#9679;</span>
              </p>
              <h2 style="color:#e2e8f0;font-size:20px;font-weight:400;font-family:Georgia,'Times New Roman',serif;margin:0;font-style:italic;">Teach Me Like I'm 10</h2>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#0c1019;border-radius:16px;border:1px solid #161a22;padding:40px 36px;">

              <!-- Heading -->
              <h1 style="color:#e2e8f0;font-size:26px;font-weight:400;font-family:Georgia,'Times New Roman',serif;margin:0 0 16px;text-align:center;">Confirm your email</h1>

              <!-- Body text -->
              <p style="color:#5f636c;font-size:14px;line-height:1.7;margin:0 0 28px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
                You're one step away from exploring any topic in 5 levels of depth. Tap below to verify your address and start learning.
              </p>

              <!-- Button -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td align="center">
                    <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#082524;border:1px solid #0a3f35;border-radius:12px;color:#6ee7b7;font-size:13px;font-weight:600;text-decoration:none;padding:14px 36px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:1.5px;">
                      VERIFY EMAIL
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:20px;">
                <tr>
                  <td style="height:1px;background-color:#131720;"></td>
                </tr>
              </table>

              <!-- Footer note -->
              <p style="color:#333740;font-size:12px;line-height:1.5;margin:0;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
                Didn't sign up? Just ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:32px;">
              <p style="color:#282c35;font-size:12px;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
                teachmelikeim10.xyz
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
